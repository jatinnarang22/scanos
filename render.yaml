services:
  - type: web
    name: scanos-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      # Render terminates TLS and proxies to the container on a Render
      # subdomain, so a leading-dot wildcard covers the assigned host
      # without needing to know it ahead of time.
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      # Set this to the deployed frontend's origin (e.g. a Vercel URL)
      # once it exists -- see README for the two-step deploy order.
      - key: CORS_EXTRA_ORIGINS
        value: ""
